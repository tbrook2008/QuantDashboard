<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markets - MarketPulse</title>
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .top-nav {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-brand {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .nav-brand span { color: var(--accent-blue); }
        .nav-links a {
            margin-left: 2rem;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.95rem;
            text-decoration: none;
        }
        .nav-links a.active { color: var(--accent-blue); border-bottom: 2px solid var(--accent-blue); padding-bottom: 1.25rem;}
        .nav-links a:hover { color: var(--accent-blue); }
        
        /* Ticker Strip */
        .market-strip {
            background-color: var(--text-primary);
            color: white;
            padding: 0.75rem 0;
            overflow: hidden;
            display: flex;
            gap: 2rem;
            font-family: var(--mono-font);
            font-size: 0.9rem;
        }
        .ticker-item { display: flex; align-items: center; gap: 0.5rem; }
        .ticker-symbol { font-weight: 700; }
        .ticker-price { padding-left: 0.5rem; }
        .ticker-up { color: #4ade80; } 
        .ticker-down { color: #f87171; } 

        /* Main Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 4rem;
        }

        .section-header {
            font-size: 1.25rem;
            font-weight: 700;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        /* News Feed */
        .news-item {
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        .news-item:last-child { border-bottom: none; }
        .news-time {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            font-weight: 600;
            text-transform: uppercase;
        }
        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
        }
        .news-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            line-height: 1.3;
        }
        .news-title a:hover { color: var(--accent-blue); text-decoration: underline; }
        .ai-sentiment {
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .sentiment-BULLISH { background-color: var(--accent-green); color: white; }
        .sentiment-BEARISH { background-color: var(--accent-red); color: white; }
        .sentiment-NEUTRAL { background-color: var(--border-color-dark); color: var(--text-primary); }

        /* Movers Table */
        .movers-table { width: 100%; border-collapse: collapse; }
        .movers-table td { padding: 0.75rem 0; border-bottom: 1px solid var(--border-color); }
        .movers-table tr:last-child td { border-bottom: none; }
        .movers-symbol { font-weight: 700; font-family: var(--mono-font); }
        .movers-change { text-align: right; font-weight: 700; color: var(--accent-green); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="nav-brand">Market<span>Pulse</span></div>
            <div class="nav-links">
                <a href="/markets" class="active">Markets</a>
                <a href="/charts">Charts</a>
                <a href="/trader">AI Engine</a>
                <a href="/portfolio">Portfolio</a>
                <a href="/settings">Config</a>
                <a href="#" id="logout-btn" style="margin-left: 3rem; color: var(--accent-red);">Disconnect</a>
            </div>
        </div>
    </nav>

    <div class="market-strip">
        <div class="container" style="display: flex; gap: 3rem;" id="ticker-strip">
            <div class="ticker-item"><span class="ticker-symbol">SPY</span><span class="ticker-price">Loading...</span></div>
            <div class="ticker-item"><span class="ticker-symbol">QQQ</span><span class="ticker-price">Loading...</span></div>
            <div class="ticker-item"><span class="ticker-symbol">BTC</span><span class="ticker-price">Loading...</span></div>
            <div class="ticker-item"><span class="ticker-symbol">ETH</span><span class="ticker-price">Loading...</span></div>
        </div>
    </div>

    <div class="container dashboard-grid">
        <!-- Main News Column -->
        <div>
            <h2 class="section-header">Breaking News Array</h2>
            <div class="card" style="padding: 1.5rem;" id="news-container">
                <p>Establishing connection to data feeds...</p>
            </div>
        </div>

        <!-- Right Side Panel -->
        <div>
            <h2 class="section-header">Top Growth Leaders</h2>
            <div class="card" style="padding: 1.5rem;" id="movers-container">
                 <p>Analyzing market volumes...</p>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/markets.js"></script>
</body>
</html>
